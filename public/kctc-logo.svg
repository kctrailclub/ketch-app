<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <clipPath id="shield">
      <path d="M100,10 L185,75 L170,190 Q100,210 30,190 L15,75 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outline -->
  <path d="M100,10 L185,75 L170,190 Q100,210 30,190 L15,75 Z"
        fill="#ffffff" stroke="#4a4a4a" stroke-width="3"/>

  <!-- Sky gradient inside shield -->
  <rect x="15" y="10" width="170" height="200" fill="#d4eaf0" clip-path="url(#shield)"/>

  <!-- Mountains - back range -->
  <polygon points="20,140 60,90 100,130 140,85 180,140" fill="#8bb5b5" opacity="0.5" clip-path="url(#shield)"/>

  <!-- Mountains - front range -->
  <polygon points="30,160 70,105 110,155" fill="#6fa3a3" opacity="0.6" clip-path="url(#shield)"/>
  <polygon points="80,160 130,100 180,160" fill="#6fa3a3" opacity="0.6" clip-path="url(#shield)"/>

  <!-- Ground -->
  <rect x="15" y="150" width="170" height="60" fill="#3a7a6a" clip-path="url(#shield)" opacity="0.8"/>

  <!-- Pine trees - back row -->
  <g clip-path="url(#shield)">
    <!-- Tree group left -->
    <polygon points="45,155 50,120 55,155" fill="#2d6b5e"/>
    <polygon points="55,155 60,115 65,155" fill="#35756a"/>
    <polygon points="35,155 40,125 45,155" fill="#2a6358"/>

    <!-- Tree group center -->
    <polygon points="85,155 92,110 99,155" fill="#2d6b5e"/>
    <polygon points="95,155 102,105 109,155" fill="#35756a"/>
    <polygon points="75,155 82,118 89,155" fill="#2a6358"/>
    <polygon points="105,155 112,112 119,155" fill="#2d6b5e"/>

    <!-- Tree group right -->
    <polygon points="135,155 140,122 145,155" fill="#35756a"/>
    <polygon points="145,155 150,118 155,155" fill="#2d6b5e"/>
    <polygon points="155,155 160,125 165,155" fill="#2a6358"/>
  </g>

  <!-- Trail/path winding down -->
  <path d="M100,155 Q95,165 100,175 Q108,182 100,192"
        fill="none" stroke="#e8e4dc" stroke-width="6" stroke-linecap="round"
        clip-path="url(#shield)"/>

  <!-- Curved text - KEN CARYL on left -->
  <path id="leftArc" d="M32,185 Q15,120 60,50" fill="none"/>
  <text font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800"
        fill="#4a4a4a" letter-spacing="3">
    <textPath href="#leftArc" startOffset="5%">KEN CARYL</textPath>
  </text>

  <!-- Curved text - TRAIL CLUB on right -->
  <path id="rightArc" d="M140,50 Q185,120 168,185" fill="none"/>
  <text font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800"
        fill="#4a4a4a" letter-spacing="3">
    <textPath href="#rightArc" startOffset="5%">TRAIL CLUB</textPath>
  </text>

  <!-- KC circle at top -->
  <circle cx="100" cy="22" r="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="2"/>
  <text x="100" y="29" text-anchor="middle" font-family="'Georgia', serif" font-size="18"
        font-weight="bold" fill="#c8913a">KC</text>
</svg>
